<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCB City Loading Screen</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #0d0e12; 
            color: #ffffff;
            font-family: 'Bahnschrift', 'DIN Pro', 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.35;
        }

        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.07) 0%, rgba(13, 14, 18, 0.2) 65%, rgba(13, 14, 18, 0.95) 100%);
        }

        .main-panel {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 560px; 
        }

        .brand-holder {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        .logo-box img {
            height: 130px; 
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0px 5px 14px rgba(0, 0, 0, 0.6));
        }

        .brand-dash {
            font-size: 78px; 
            font-weight: 600;
            line-height: 1;
            margin-left: 16px;  
            margin-right: 13px; 
            text-shadow: 0px 5px 14px rgba(0, 0, 0, 0.6);
            opacity: 0.9;
            transform: translateY(-5px); 
        }

        .text-city {
            font-size: 78px; 
            font-weight: 600; 
            letter-spacing: -1.5px;
            line-height: 1;
            text-shadow: 0px 5px 14px rgba(0, 0, 0, 0.75), 0px 0px 22px rgba(255, 255, 255, 0.05);
        }

        /* БЛОК СОВЕТОВ С ЛИНЕЙКОЙ (СДВИНУТ НИЖЕ) */
        .tips-container {
            width: 100%;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 25px; /* Увеличили отступ сверху */
            margin-top: 20px;   /* Опустили весь блок еще ниже */
        }

        /* ФРАЗЫ СТАЛИ БОЛЬШЕ, ЖИРНЕЕ И ЧИСТО БЕЛОГО ЦВЕТА */
        #tips-msg {
            font-size: 18px; /* Увеличено с 14px */
            font-weight: 500; /* Сделано плотнее */
            letter-spacing: 0.5px;
            color: #ffffff; /* Сменили серый на чистый белый, как логотип */
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5); /* Добавили тень */
            min-height: 25px;
            opacity: 1;
            transition: opacity 0.6s ease-in-out;
        }

        .footer-navigation {
            position: absolute;
            bottom: 40px;
            left: 50px; 
            z-index: 10;
            font-size: 15px; 
            font-weight: 500; 
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.45);
            text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <canvas id="bg-particles"></canvas>
    <div class="vignette"></div>

    <div class="main-panel">
        <div class="brand-holder">
            <div class="logo-box">
                <img src="lcb.png" alt="" onerror="this.style.display='none'; document.getElementById('text-fallback').style.display='inline-block';">
                <span id="text-fallback" style="display:none; font-size:54px; font-weight:700; margin-right:12px;">LCB</span>
            </div>
            
            <div class="brand-dash">-</div>
            <div class="text-city">City</div>
        </div>

        <div class="tips-container">
            <div id="tips-msg">Загрузка интерфейса...</div>
        </div>
    </div>

    <div class="footer-navigation">
        Localka-Box Discord: discord.gg/Pukt9syQXW
    </div>

    <script>
        // --- МАССИВ С ВАШИМИ СОВЕТАМИ ---
        const tips = [
            "Изначально сервер был и вправду локальным",
            "Все началось из-за группы",
            "У нас есть свои карты",
            "Наш сервер находится на VDS хосте",
            "Незнание правил не освобождает от ответственности",
            "Приятной игры !"
        ];

        let shuffledTips = [];
        let currentTipIndex = 0;

        // Функция для честного перемешивания массива (Алгоритм Фишера-Йетса)
        function shuffleTips() {
            shuffledTips = [...tips];
            for (let i = shuffledTips.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledTips[i], shuffledTips[j]] = [shuffledTips[j], shuffledTips[i]];
            }
            // Проверка: чтобы первая фраза нового цикла не совпадала с последней фразой старого цикла
            if (shuffledTips[0] === tipsElement.innerText && shuffledTips.length > 1) {
                shuffledTips.push(shuffledTips.shift());
            }
        }

        const tipsElement = document.getElementById('tips-msg');

        function changeTip() {
            tipsElement.style.opacity = 0;

            setTimeout(() => {
                // Если перемешанный список кончился — перемешиваем заново
                if (currentTipIndex >= shuffledTips.length) {
                    shuffleTips();
                    currentTipIndex = 0;
                }

                tipsElement.innerText = shuffledTips[currentTipIndex];
                currentTipIndex++;
                tipsElement.style.opacity = 1;
            }, 600); 
        }

        // Стартовая инициализация при загрузке страницы
        shuffleTips();
        tipsElement.innerText = shuffledTips[currentTipIndex];
        currentTipIndex++;

        // Запуск смены советов строго каждые 10 секунд
        setInterval(changeTip, 10000);


        // --- СКРИПТ АНИМИРОВАННОГО ДОЖДЯ С ФИКСОМ СКОРОСТИ GMOD ---
        const canvas = document.getElementById('bg-particles');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        const particleCount = 80; 
        const particles = [];

        for (let i = 0; i < particleCount; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                length: Math.random() * 8 + 6,  
                speed: Math.random() * 2.8 + 1.8 
            });
        }

        let lastTime = performance.now();

        function drawParticles(currentTime) {
            let deltaTime = (currentTime - lastTime) / 16.66; 
            if (deltaTime > 4) deltaTime = 4; 
            lastTime = currentTime;

            ctx.clearRect(0, 0, width, height);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)'; 
            ctx.lineWidth = 1;

            for (let i = 0; i < particleCount; i++) {
                const p = particles[i];
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x, p.y + p.length); 
                ctx.stroke();

                p.y += p.speed * deltaTime;

                if (p.y > height) {
                    p.y = -15;
                    p.x = Math.random() * width;
                }
            }
            requestAnimationFrame(drawParticles);
        }
        requestAnimationFrame(drawParticles);

        function SetFilesNeeded() {}
        function DownloadingFile() {}
        function SetStatusChanged() {}
    </script>
</body>
</html>
