<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCB City Loading Screen</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #0d0e12; 
            color: #ffffff;
            font-family: 'Bahnschrift', 'DIN Pro', 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.35;
        }

        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.07) 0%, rgba(13, 14, 18, 0.2) 65%, rgba(13, 14, 18, 0.95) 100%);
        }

        .main-panel {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 560px; 
        }

        .brand-holder {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        .logo-box img {
            height: 130px; 
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0px 5px 14px rgba(0, 0, 0, 0.6));
        }

        .brand-dash {
            font-size: 78px; 
            font-weight: 600;
            line-height: 1;
            margin-left: 16px;  
            margin-right: 13px; 
            text-shadow: 0px 5px 14px rgba(0, 0, 0, 0.6);
            opacity: 0.9;
            transform: translateY(-5px); 
        }

        .text-city {
            font-size: 78px; 
            font-weight: 600; 
            letter-spacing: -1.5px;
            line-height: 1;
            text-shadow: 0px 5px 14px rgba(0, 0, 0, 0.75), 0px 0px 22px rgba(255, 255, 255, 0.05);
        }

        .status-info {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 12px; 
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.45);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 12px;
        }

        #status-msg {
            max-width: 80%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #status-pct {
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
        }

        .footer-navigation {
            position: absolute;
            bottom: 40px;
            left: 50px; 
            z-index: 10;
            font-size: 15px; 
            font-weight: 500; 
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.45);
            text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <canvas id="bg-particles"></canvas>
    <div class="vignette"></div>

    <div class="main-panel">
        <div class="brand-holder">
            <div class="logo-box">
                <img src="lcb.png" alt="" onerror="this.style.display='none'; document.getElementById('text-fallback').style.display='inline-block';">
                <span id="text-fallback" style="display:none; font-size:54px; font-weight:700; margin-right:12px;">LCB</span>
            </div>
            
            <div class="brand-dash">-</div>
            <div class="text-city">City</div>
        </div>

        <div class="status-info">
            <div id="status-msg">Инициализация...</div>
            <div id="status-pct">0%</div>
        </div>
    </div>

    <div class="footer-navigation">
        Discord: https://discord.gg
    </div>

    <script>
        // --- ПОЛНЫЙ СЛОВАРЬ ПЕРЕВОДА ДЛЯ GARRY'S MOD ---
        const translations = {
            "connecting to server": "Подключение к серверу",
            "retrieving server info": "Получение информации о сервере",
            "loading resources": "Загрузка серверных ресурсов",
            "sending client info": "Отправка данных клиента",
            "starting lua": "Запуск скриптов LUA",
            "loading lua": "Загрузка модулей LUA",
            "workshop complete": "Загрузка контента из мастерской завершена",
            "finished": "Загрузка завершена. Вход...",
            "mount addons": "Монтирование серверных аддонов",
            "getting addon info": "Получение информации об аддонах",
            "loading cache content": "Загрузка кэшированного контента",
            "fetching subscriptions": "Проверка подписок Steam Workshop",
            "checking addons": "Проверка локальных аддонов",
            "downloading security components": "Загрузка компонентов безопасности",
            "initializing": "Инициализация интерфейса"
        };

        const stageProgress = {
            "connecting to server": 5,
            "retrieving server info": 15,
            "getting addon info": 25,
            "loading cache content": 40,
            "loading resources": 55,
            "loading lua": 75,
            "starting lua": 90,
            "sending client info": 97,
            "finished": 100
        };

        function translateStatus(status) {
            let lowStatus = status.toLowerCase().trim();
            if (lowStatus.endsWith("...")) {
                lowStatus = lowStatus.slice(0, -3).trim();
            }
            
            if (window.totalFiles === 0 && stageProgress[lowStatus]) {
                updatePercentText(stageProgress[lowStatus]);
            }

            if (translations[lowStatus]) {
                return translations[lowStatus] + "...";
            }
            return status;
        }

        // --- СКРИПТ АНИМИРОВАННОГО ДОЖДЯ ---
        const canvas = document.getElementById('bg-particles');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        const particleCount = 80; 
        const particles = [];

        for (let i = 0; i < particleCount; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                length: Math.random() * 8 + 6,  
                speed: Math.random() * 2.8 + 1.8 
            });
        }

        let lastTime = performance.now();

        function drawParticles(currentTime) {
            let deltaTime = (currentTime - lastTime) / 16.66; 
            if (deltaTime > 4) deltaTime = 4; 
            lastTime = currentTime;

            ctx.clearRect(0, 0, width, height);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)'; 
            ctx.lineWidth = 1;

            for (let i = 0; i < particleCount; i++) {
                const p = particles[i];
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x, p.y + p.length); 
                ctx.stroke();

                p.y += p.speed * deltaTime;

                if (p.y > height) {
                    p.y = -15;
                    p.x = Math.random() * width;
                }
            }
            requestAnimationFrame(drawParticles);
        }
        requestAnimationFrame(drawParticles);

        // --- ВЗАИМОДЕЙСТВИЕ С ДВИЖКОМ GARRY'S MOD ---
        window.totalFiles = 0;
        window.filesLeft = 0;

        function SetFilesNeeded(needed) {
            if (needed && needed > 0) {
                window.totalFiles = needed;
                window.filesLeft = needed;
            }
            calculateProgress();
        }

        function DownloadingFile(fileName) {
            let cleanName = fileName.replace(/^.+\//, '');
            document.getElementById('status-msg').innerText = `Скачивание: ${cleanName}`;
            
            if (window.filesLeft && window.filesLeft > 0) {
                window.filesLeft--;
            } else if (window.totalFiles === 0) {
                let currentPct = parseInt(document.getElementById('status-pct').innerText) || 40;
                if (currentPct < 88) updatePercentText(currentPct + 1);
            }
            calculateProgress();
        }

        function SetStatusChanged(status) {
            document.getElementById('status-msg').innerText = translateStatus(status);
        }

        function updatePercentText(pct) {
            document.getElementById('status-pct').innerText = pct + '%';
        }

        function calculateProgress() {
            if (!window.totalFiles || window.totalFiles === 0) return;
            
            let percent = Math.floor(((window.totalFiles - window.filesLeft) / window.totalFiles) * 100);
            if (percent > 100) percent = 100;
            if (percent < 0) percent = 0;

            updatePercentText(percent);
        }
    </script>
</body>
</html>
